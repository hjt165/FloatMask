name: Build FloatMask APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 允许手动触发构建
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    # 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 设置Python环境
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 安装系统依赖
    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -yq \
          build-essential \
          git \
          libffi-dev \
          libssl-dev \
          libtool \
          pkg-config \
          autoconf \
          automake \
          cmake \
          libltdl-dev \
          python3-venv \
          python3-dev \
          zlib1g-dev

    # 缓存buildozer下载的文件（Python依赖 + Android SDK/NDK）
    - name: Cache buildozer downloads
      uses: actions/cache@v4
      id: cache
      with:
        path: |
          ~/.buildozer
          ~/.local/share/python-for-android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('requirements.txt', 'buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    # 安装Python依赖
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install buildozer cython

    # 构建Debug APK
    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    # 上传构建产物
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: floatmask-apk-${{ github.sha }}
        path: bin/*.apk
        if-no-files-found: error

    # 如果是release tag，也发布到Release页面
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
