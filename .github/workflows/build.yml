name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_HOME: /home/runner/android-sdk

jobs:
  build:
    name: Build FloatMask APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake autopoint gettext

      - name: Install Android SDK command-line tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip -O cmdtools.zip
          unzip -q -o cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          ls -la $ANDROID_HOME/cmdline-tools/latest/bin/

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-33"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.34
          pip install git+https://github.com/kivy/buildozer.git

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMask-APK
          path: bin/*.apk
          retention-days: 30
        if: success()

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
        if: always()
