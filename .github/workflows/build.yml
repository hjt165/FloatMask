name: Build FloatMask APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64-v8a
          - x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(github.event.inputs.arch != 'all' && format('["{0}"]', github.event.inputs.arch) || '["arm64-v8a", "x86_64"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake autopoint gettext

      - name: Install Buildozer
        run: |
          pip install --upgrade pip Cython==0.29.34
          pip install git+https://github.com/kivy/buildozer.git

      - name: Configure architecture
        run: |
          sed -i "s/android.archs = .*/android.archs = ${{ matrix.arch }}/" buildozer.spec
          cat buildozer.spec | grep android.archs

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FloatMask-APK-${{ matrix.arch }}
          path: |
            bin/*.apk
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FloatMask-Build-Log-${{ matrix.arch }}
          path: build.log
          retention-days: 7