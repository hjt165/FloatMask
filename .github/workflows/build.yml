name: Build FloatMask APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64-v8a
          - x86_64

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
          - arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake autopoint gettext

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.34
          pip install git+https://github.com/kivy/buildozer.git

      - name: Configure architecture
        run: |
          sed -i "s/android.archs = .*/android.archs = ${{ matrix.arch }}/" buildozer.spec
          echo "Target architecture:"
          grep android.archs buildozer.spec

      - name: Build APK (download SDK only)
        continue-on-error: true
        run: |
          buildozer -v android debug 2>&1 | tee build-first.log; true

      - name: Accept licenses using Buildozer's sdkmanager
        run: |
          BUILD_SDK="$HOME/.buildozer/android/platform/android-sdk"
          echo "=== SDK directory ==="
          ls -la "$BUILD_SDK/" 2>/dev/null || echo "No SDK dir"
          echo "=== SDK tools ==="
          ls "$BUILD_SDK/tools/bin/" 2>/dev/null || echo "No tools/bin"
          if [ -f "$BUILD_SDK/tools/bin/sdkmanager" ]; then
            echo "Accepting licenses..."
            yes | "$BUILD_SDK/tools/bin/sdkmanager" --sdk_root="$BUILD_SDK" --licenses || true
            echo "=== Licenses ==="
            ls -la "$BUILD_SDK/licenses/" 2>/dev/null || echo "No licenses dir"
          else
            echo "sdkmanager not found, trying cmdline-tools..."
            ls "$BUILD_SDK/cmdline-tools/" 2>/dev/null || echo "No cmdline-tools"
          fi

      - name: Build APK (retry with licenses)
        run: |
          buildozer -v android debug 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMask-APK-${{ matrix.arch }}
          path: bin/*.apk
          retention-days: 30
        if: success()

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.arch }}
          path: |
            build-first.log
            build.log
          retention-days: 7
        if: always()