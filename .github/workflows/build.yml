name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build FloatMask APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            automake autopoint gettext

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.34
          pip install git+https://github.com/kivy/buildozer.git

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.android/sdk-preview-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.android/sdk-license
          echo "e6b7c2ab7fa2298c15165e9583d02420bfd05191" >> ~/.android/sdk-license

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMask-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
        if: always()
